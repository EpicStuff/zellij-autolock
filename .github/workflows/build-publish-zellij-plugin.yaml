---
# src: https://raw.githubusercontent.com/dj95/zjstatus/main/.github/workflows/release.yml

name: 'Build and Publish'
on:
  push:
    branches:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    name: build-release
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: package
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          profile: minimal
          override: true
          toolchain: '1.83.0'
          target: wasm32-wasip1

      - name: Build release binary
        run: cargo build --release

      - if: github.ref == 'refs/heads/main'
        name: Create latest release
        env:
          GH_TOKEN: '${{ github.token }}'
          VERSION: '${{ steps.package.outputs.version }}'
        run: |
          tag="main-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gh release create "$tag" \
            './target/wasm32-wasip1/release/zellij-autolock.wasm' \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes "Automated build from commit $GITHUB_SHA." \
            --latest
